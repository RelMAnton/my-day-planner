<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Day Planner" />
  <title>Day Planner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, sans-serif;
      background: #f2f2f7;
      color: #1c1c1e;
      min-height: 100vh;
    }

    .header {
      background: white;
      padding: 16px 20px 12px;
      border-bottom: 1px solid #e5e5ea;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .header .date {
      font-size: 14px;
      color: #8e8e93;
      margin-top: 2px;
    }

    .content { padding: 16px; }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #8e8e93;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 16px 0 8px;
    }

    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .block-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid #f2f2f7;
      gap: 12px;
    }

    .block-item:last-child { border-bottom: none; }

    .block-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .block-info { flex: 1; }

    .block-name {
      font-size: 16px;
      font-weight: 500;
    }

    .block-time {
      font-size: 13px;
      color: #8e8e93;
      margin-top: 2px;
    }

    .block-delete {
      background: none;
      border: none;
      color: #c7c7cc;
      font-size: 20px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }

    .block-delete:hover { color: #ff3b30; }

    .add-btn {
      width: 100%;
      background: white;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      color: #007aff;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
    }

    .add-btn:hover { background: #f2f2f7; }

    .empty {
      text-align: center;
      padding: 32px 16px;
      color: #8e8e93;
      font-size: 15px;
    }

    /* Modal */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: flex-end;
    }

    .overlay.open { display: flex; }

    .modal {
      background: #f2f2f7;
      border-radius: 16px 16px 0 0;
      width: 100%;
      padding: 20px;
      padding-bottom: 40px;
    }

    .modal h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      text-align: center;
    }

    .modal label {
      font-size: 13px;
      font-weight: 600;
      color: #8e8e93;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: block;
      margin: 12px 0 6px;
    }

    .modal input, .modal select {
      width: 100%;
      background: white;
      border: none;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 16px;
      color: #1c1c1e;
      outline: none;
    }

    .color-row {
      display: flex;
      gap: 10px;
      margin-top: 6px;
    }

    .color-dot {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
    }

    .color-dot.selected {
      border-color: #1c1c1e;
    }

    .presets {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }

    .preset-chip {
      background: white;
      border: none;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 14px;
      cursor: pointer;
      color: #1c1c1e;
    }

    .preset-chip:hover { background: #e5e5ea; }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn-cancel {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: white;
      font-size: 16px;
      cursor: pointer;
      color: #1c1c1e;
    }

    .btn-save {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: #007aff;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .time-row {
      display: flex;
      gap: 10px;
    }

    .time-row input {
      flex: 1;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>My Day</h1>
  <div class="date" id="dateLabel"></div>
</div>

<div class="content">
  <div class="section-title">Today's plan</div>
  <div class="card" id="blockList">
    <div class="empty" id="emptyMsg">No activities yet. Add your first one!</div>
  </div>
  <button class="add-btn" onclick="openModal()">+ Add Activity</button>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>Add Activity</h2>

    <label>Activity name</label>
    <input type="text" id="actName" placeholder="e.g. Morning run" />

    <label>Quick pick</label>
    <div class="presets" id="presets"></div>

    <label>Time</label>
    <div class="time-row">
      <input type="time" id="timeFrom" />
      <input type="time" id="timeTo" />
    </div>

    <label>Color</label>
    <div class="color-row" id="colorRow"></div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveBlock()">Add</button>
    </div>
  </div>
</div>

<script>
  const COLORS = ['#007aff','#34c759','#ff9500','#ff3b30','#af52de','#5ac8fa','#ff2d55','#ffcc00'];
  const PRESETS = ['Sport','Dog walk','Workout','Dinner','Choir','Reading','Work','Shopping','Nap','Cooking'];

  let blocks = JSON.parse(localStorage.getItem('blocks') || '[]');
  let selectedColor = COLORS[0];

  function todayKey() {
    return new Date().toDateString();
  }

  function init() {
    const last = localStorage.getItem('lastDay');
    const today = todayKey();
    if (last !== today) {
      blocks = [];
      localStorage.setItem('blocks', '[]');
      localStorage.setItem('lastDay', today);
    }

    document.getElementById('dateLabel').textContent =
      new Date().toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' });

    buildColorPicker();
    buildPresets();
    render();
  }

  function buildColorPicker() {
    const row = document.getElementById('colorRow');
    row.innerHTML = '';
    COLORS.forEach(c => {
      const d = document.createElement('div');
      d.className = 'color-dot' + (c === selectedColor ? ' selected' : '');
      d.style.background = c;
      d.onclick = () => { selectedColor = c; buildColorPicker(); };
      row.appendChild(d);
    });
  }

  function buildPresets() {
    const el = document.getElementById('presets');
    el.innerHTML = '';
    PRESETS.forEach(p => {
      const b = document.createElement('button');
      b.className = 'preset-chip';
      b.textContent = p;
      b.onclick = () => { document.getElementById('actName').value = p; };
      el.appendChild(b);
    });
  }

  function render() {
    const list = document.getElementById('blockList');
    const empty = document.getElementById('emptyMsg');

    const sorted = [...blocks].sort((a,b) => a.from.localeCompare(b.from));

    if (sorted.length === 0) {
      list.innerHTML = '';
      list.appendChild(empty);
      return;
    }

    list.innerHTML = '';
    sorted.forEach((b, i) => {
      const div = document.createElement('div');
      div.className = 'block-item';
      div.innerHTML = `
        <div class="block-dot" style="background:${b.color}"></div>
        <div class="block-info">
          <div class="block-name">${b.name}</div>
          <div class="block-time">${b.from} – ${b.to}</div>
        </div>
        <button class="block-delete" onclick="deleteBlock(${i})">×</button>
      `;
      list.appendChild(div);
    });
  }

  function openModal() {
    document.getElementById('actName').value = '';
    document.getElementById('timeFrom').value = '';
    document.getElementById('timeTo').value = '';
    selectedColor = COLORS[0];
    buildColorPicker();
    document.getElementById('overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
  }

  function saveBlock() {
    const name = document.getElementById('actName').value.trim();
    const from = document.getElementById('timeFrom').value;
    const to = document.getElementById('timeTo').value;
    if (!name || !from || !to) { alert('Please fill in name and both times.'); return; }
    blocks.push({ name, from, to, color: selectedColor });
    localStorage.setItem('blocks', JSON.stringify(blocks));
    closeModal();
    render();
  }

  function deleteBlock(i) {
    const sorted = [...blocks].sort((a,b) => a.from.localeCompare(b.from));
    const item = sorted[i];
    blocks = blocks.filter(b => !(b.name === item.name && b.from === item.from && b.to === item.to));
    localStorage.setItem('blocks', JSON.stringify(blocks));
    render();
  }

  document.getElementById('overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  init();
</script>
</body>
</html>
