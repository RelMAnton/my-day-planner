<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Day Planner" />
  <title>Day Planner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f2f2f7; color: #1c1c1e; min-height: 100vh; }

    .header { background: white; padding: 16px 20px 12px; border-bottom: 1px solid #e5e5ea; position: sticky; top: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between; }
    .header-left h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
    .header-left .date { font-size: 14px; color: #8e8e93; margin-top: 2px; }
    .cal-btn { background: none; border: none; font-size: 24px; cursor: pointer; padding: 4px; }

    .content { padding: 16px; }
    .section-title { font-size: 13px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 8px; }

    .card { background: white; border-radius: 12px; overflow: hidden; margin-bottom: 8px; }
    .block-item { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid #f2f2f7; gap: 12px; }
    .block-item:last-child { border-bottom: none; }
    .block-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .block-info { flex: 1; }
    .block-name { font-size: 16px; font-weight: 500; }
    .block-time { font-size: 13px; color: #8e8e93; margin-top: 2px; }
    .block-delete { background: none; border: none; color: #c7c7cc; font-size: 20px; cursor: pointer; padding: 0 4px; line-height: 1; }
    .block-delete:hover { color: #ff3b30; }

    .add-btn { width: 100%; background: white; border: none; border-radius: 12px; padding: 14px; font-size: 16px; color: #007aff; font-weight: 500; cursor: pointer; margin-top: 8px; }
    .add-btn:hover { background: #e5e5ea; }
    .empty { text-align: center; padding: 32px 16px; color: #8e8e93; font-size: 15px; }

    /* Modal shared */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: flex-end; }
    .overlay.open { display: flex; }
    .modal { background: #f2f2f7; border-radius: 16px 16px 0 0; width: 100%; padding: 20px; padding-bottom: 40px; max-height: 90vh; overflow-y: auto; }
    .modal h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; text-align: center; }
    .modal label { font-size: 13px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin: 12px 0 6px; }
    .modal input, .modal select { width: 100%; background: white; border: none; border-radius: 10px; padding: 12px 14px; font-size: 16px; color: #1c1c1e; outline: none; }
    .color-row { display: flex; gap: 10px; margin-top: 6px; flex-wrap: wrap; }
    .color-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
    .color-dot.selected { border-color: #1c1c1e; }
    .presets { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
    .preset-chip { background: white; border: none; border-radius: 20px; padding: 6px 14px; font-size: 14px; cursor: pointer; color: #1c1c1e; }
    .preset-chip:hover { background: #e5e5ea; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-cancel { flex: 1; padding: 14px; border-radius: 12px; border: none; background: white; font-size: 16px; cursor: pointer; color: #1c1c1e; }
    .btn-save { flex: 1; padding: 14px; border-radius: 12px; border: none; background: #007aff; color: white; font-size: 16px; font-weight: 600; cursor: pointer; }
    .time-row { display: flex; gap: 10px; }
    .time-row input { flex: 1; }

    /* Calendar modal */
    .cal-modal { background: #f2f2f7; border-radius: 16px 16px 0 0; width: 100%; padding: 20px; padding-bottom: 40px; }
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .cal-nav button { background: none; border: none; font-size: 20px; cursor: pointer; color: #007aff; padding: 4px 10px; }
    .cal-nav span { font-size: 17px; font-weight: 600; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-day-name { text-align: center; font-size: 12px; font-weight: 600; color: #8e8e93; padding: 4px 0; }
    .cal-cell { display: flex; flex-direction: column; align-items: center; padding: 6px 2px; border-radius: 10px; cursor: pointer; min-height: 44px; justify-content: center; }
    .cal-cell:hover { background: #e5e5ea; }
    .cal-cell.today { background: #007aff; }
    .cal-cell.today .cal-num { color: white; }
    .cal-cell.selected { background: #e5e5ea; }
    .cal-cell.empty { cursor: default; }
    .cal-cell.empty:hover { background: none; }
    .cal-num { font-size: 16px; font-weight: 500; color: #1c1c1e; }
    .cal-dot { width: 5px; height: 5px; border-radius: 50%; background: #007aff; margin-top: 3px; }
    .cal-cell.today .cal-dot { background: white; }
    .cal-close { width: 100%; margin-top: 16px; padding: 14px; border-radius: 12px; border: none; background: white; font-size: 16px; cursor: pointer; color: #1c1c1e; font-weight: 500; }

    .viewing-banner { background: #fff3cd; border-radius: 10px; padding: 10px 14px; margin-bottom: 10px; font-size: 14px; color: #856404; display: flex; align-items: center; justify-content: space-between; }
    .viewing-banner button { background: none; border: none; color: #007aff; font-size: 14px; cursor: pointer; font-weight: 500; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>My Day</h1>
    <div class="date" id="dateLabel"></div>
  </div>
  <button class="cal-btn" onclick="openCalendar()" title="Calendar">📅</button>
</div>

<div class="content">
  <div id="viewingBanner" class="viewing-banner" style="display:none">
    <span id="viewingLabel"></span>
    <button onclick="goToToday()">Go to today</button>
  </div>
  <div class="section-title" id="planTitle">Today's plan</div>
  <div class="card" id="blockList"></div>
  <button class="add-btn" id="addBtn" onclick="openModal()">+ Add Activity</button>
</div>

<!-- Add activity modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>Add Activity</h2>
    <label>Activity name</label>
    <input type="text" id="actName" placeholder="e.g. Morning run" />
    <label>Quick pick</label>
    <div class="presets" id="presets"></div>
    <label>Time</label>
    <div class="time-row">
      <input type="time" id="timeFrom" />
      <input type="time" id="timeTo" />
    </div>
    <label>Color</label>
    <div class="color-row" id="colorRow"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveBlock()">Add</button>
    </div>
  </div>
</div>

<!-- Calendar modal -->
<div class="overlay" id="calOverlay">
  <div class="cal-modal">
    <div class="cal-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <span id="calMonthLabel"></span>
      <button onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <button class="cal-close" onclick="closeCalendar()">Close</button>
  </div>
</div>

<script>
  const COLORS = ['#007aff','#34c759','#ff9500','#ff3b30','#af52de','#5ac8fa','#ff2d55','#ffcc00'];
  const PRESETS = ['Sport','Dog walk','Workout','Dinner','Choir','Reading','Work','Shopping','Nap','Cooking'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  let selectedColor = COLORS[0];
  let viewingDate = null; // null = today
  let calMonth, calYear;

  function dateKey(d) {
    return d.toISOString().slice(0, 10);
  }

  function todayKey() {
    return dateKey(new Date());
  }

  function getBlocks(key) {
    const all = JSON.parse(localStorage.getItem('allDays') || '{}');
    return all[key] || [];
  }

  function setBlocks(key, blocks) {
    const all = JSON.parse(localStorage.getItem('allDays') || '{}');
    all[key] = blocks;
    localStorage.setItem('allDays', JSON.stringify(all));
  }

  function currentKey() {
    return viewingDate ? dateKey(viewingDate) : todayKey();
  }

  function isViewingToday() {
    return !viewingDate || dateKey(viewingDate) === todayKey();
  }

  function init() {
    const now = new Date();
    calMonth = now.getMonth();
    calYear = now.getFullYear();
    buildColorPicker();
    buildPresets();
    renderDay();
  }

  function renderDay() {
    const key = currentKey();
    const blocks = getBlocks(key);
    const isToday = isViewingToday();

    const d = viewingDate || new Date();
    document.getElementById('dateLabel').textContent =
      d.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' });

    document.getElementById('viewingBanner').style.display = isToday ? 'none' : 'flex';
    if (!isToday) {
      document.getElementById('viewingLabel').textContent =
        'Viewing: ' + d.toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
    }

    document.getElementById('planTitle').textContent = isToday ? "Today's plan" : "Activities";
    document.getElementById('addBtn').style.display = isToday ? 'block' : 'none';

    const list = document.getElementById('blockList');
    const sorted = [...blocks].sort((a,b) => a.from.localeCompare(b.from));

    if (sorted.length === 0) {
      list.innerHTML = '<div class="empty">' + (isToday ? 'No activities yet. Add your first one!' : 'No activities on this day.') + '</div>';
      return;
    }

    list.innerHTML = '';
    sorted.forEach((b, i) => {
      const div = document.createElement('div');
      div.className = 'block-item';
      div.innerHTML = `
        <div class="block-dot" style="background:${b.color}"></div>
        <div class="block-info">
          <div class="block-name">${b.name}</div>
          <div class="block-time">${b.from} – ${b.to}</div>
        </div>
        ${isToday ? `<button class="block-delete" onclick="deleteBlock(${i})">×</button>` : ''}
      `;
      list.appendChild(div);
    });
  }

  function goToToday() {
    viewingDate = null;
    renderDay();
  }

  function deleteBlock(i) {
    const key = currentKey();
    let blocks = getBlocks(key);
    const sorted = [...blocks].sort((a,b) => a.from.localeCompare(b.from));
    const item = sorted[i];
    blocks = blocks.filter(b => !(b.name === item.name && b.from === item.from && b.to === item.to));
    setBlocks(key, blocks);
    renderDay();
  }

  function buildColorPicker() {
    const row = document.getElementById('colorRow');
    row.innerHTML = '';
    COLORS.forEach(c => {
      const d = document.createElement('div');
      d.className = 'color-dot' + (c === selectedColor ? ' selected' : '');
      d.style.background = c;
      d.onclick = () => { selectedColor = c; buildColorPicker(); };
      row.appendChild(d);
    });
  }

  function buildPresets() {
    const el = document.getElementById('presets');
    el.innerHTML = '';
    PRESETS.forEach(p => {
      const b = document.createElement('button');
      b.className = 'preset-chip';
      b.textContent = p;
      b.onclick = () => { document.getElementById('actName').value = p; };
      el.appendChild(b);
    });
  }

  function openModal() {
    document.getElementById('actName').value = '';
    document.getElementById('timeFrom').value = '';
    document.getElementById('timeTo').value = '';
    selectedColor = COLORS[0];
    buildColorPicker();
    document.getElementById('overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
  }

  function saveBlock() {
    const name = document.getElementById('actName').value.trim();
    const from = document.getElementById('timeFrom').value;
    const to = document.getElementById('timeTo').value;
    if (!name || !from || !to) { alert('Please fill in name and both times.'); return; }
    const key = todayKey();
    const blocks = getBlocks(key);
    blocks.push({ name, from, to, color: selectedColor });
    setBlocks(key, blocks);
    closeModal();
    renderDay();
  }

  // Calendar
  function openCalendar() {
    const now = new Date();
    calMonth = now.getMonth();
    calYear = now.getFullYear();
    renderCalendar();
    document.getElementById('calOverlay').classList.add('open');
  }

  function closeCalendar() {
    document.getElementById('calOverlay').classList.remove('open');
  }

  function changeMonth(dir) {
    calMonth += dir;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    if (calMonth < 0) { calMonth = 11; calYear--; }
    renderCalendar();
  }

  function renderCalendar() {
    document.getElementById('calMonthLabel').textContent = MONTHS[calMonth] + ' ' + calYear;
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    DAYS.forEach(d => {
      const cell = document.createElement('div');
      cell.className = 'cal-day-name';
      cell.textContent = d;
      grid.appendChild(cell);
    });

    const firstDay = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    const todayStr = todayKey();
    const all = JSON.parse(localStorage.getItem('allDays') || '{}');

    for (let i = 0; i < firstDay; i++) {
      const blank = document.createElement('div');
      blank.className = 'cal-cell empty';
      grid.appendChild(blank);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const dateObj = new Date(calYear, calMonth, d);
      const key = dateKey(dateObj);
      const isToday = key === todayStr;
      const hasData = all[key] && all[key].length > 0;

      const cell = document.createElement('div');
      cell.className = 'cal-cell' + (isToday ? ' today' : '');
      cell.innerHTML = `<span class="cal-num">${d}</span>${hasData ? '<div class="cal-dot"></div>' : ''}`;
      cell.onclick = () => {
        viewingDate = isToday ? null : dateObj;
        closeCalendar();
        renderDay();
      };
      grid.appendChild(cell);
    }
  }

  document.getElementById('overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.getElementById('calOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeCalendar();
  });

  init();
</script>
</body>
</html>
