<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Day Planner" />
  <title>Day Planner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f2f2f7; color: #1c1c1e; min-height: 100vh; padding-bottom: 80px; }

    .header { background: white; padding: 16px 20px 12px; border-bottom: 1px solid #e5e5ea; position: sticky; top: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between; }
    .header-left h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
    .header-left .date { font-size: 14px; color: #8e8e93; margin-top: 2px; }
    .cal-btn { background: none; border: none; font-size: 24px; cursor: pointer; padding: 4px; }

    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e5e5ea; display: flex; z-index: 20; padding-bottom: env(safe-area-inset-bottom); }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 0 8px; background: none; border: none; cursor: pointer; gap: 3px; }
    .nav-btn .nav-icon { font-size: 22px; }
    .nav-btn .nav-label { font-size: 11px; color: #8e8e93; font-weight: 500; }
    .nav-btn.active .nav-label { color: #007aff; }

    .page { display: none; }
    .page.active { display: block; }
    .content { padding: 16px; }
    .section-title { font-size: 13px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 8px; }

    .card { background: white; border-radius: 12px; overflow: hidden; margin-bottom: 8px; }
    .block-item { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid #f2f2f7; gap: 12px; }
    .block-item:last-child { border-bottom: none; }
    .block-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .block-info { flex: 1; }
    .block-name { font-size: 16px; font-weight: 500; }
    .block-time { font-size: 13px; color: #8e8e93; margin-top: 2px; }
    .block-delete { background: none; border: none; color: #c7c7cc; font-size: 20px; cursor: pointer; padding: 0 4px; line-height: 1; }
    .block-delete:hover { color: #ff3b30; }

    .add-btn { width: 100%; background: white; border: none; border-radius: 12px; padding: 14px; font-size: 16px; color: #007aff; font-weight: 500; cursor: pointer; margin-top: 8px; }
    .add-btn:hover { background: #e5e5ea; }
    .empty { text-align: center; padding: 32px 16px; color: #8e8e93; font-size: 15px; }

    .date-group { margin-bottom: 20px; }
    .date-group-label { font-size: 13px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .date-group-label.is-today { color: #007aff; }

    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: flex-end; }
    .overlay.open { display: flex; }
    .modal { background: #f2f2f7; border-radius: 16px 16px 0 0; width: 100%; padding: 20px; padding-bottom: 40px; max-height: 90vh; overflow-y: auto; }
    .modal h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; text-align: center; }
    .modal label { font-size: 13px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin: 12px 0 6px; }
    .modal input { width: 100%; background: white; border: none; border-radius: 10px; padding: 12px 14px; font-size: 16px; color: #1c1c1e; outline: none; }
    .color-row { display: flex; gap: 10px; margin-top: 6px; flex-wrap: wrap; }
    .color-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
    .color-dot.selected { border-color: #1c1c1e; }
    .presets { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
    .preset-chip { background: white; border: none; border-radius: 20px; padding: 6px 14px; font-size: 14px; cursor: pointer; color: #1c1c1e; }
    .preset-chip:hover { background: #e5e5ea; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-cancel { flex: 1; padding: 14px; border-radius: 12px; border: none; background: white; font-size: 16px; cursor: pointer; color: #1c1c1e; }
    .btn-save { flex: 1; padding: 14px; border-radius: 12px; border: none; background: #007aff; color: white; font-size: 16px; font-weight: 600; cursor: pointer; }
    .time-row { display: flex; gap: 10px; }
    .time-row input { flex: 1; }

    /* Custom date picker */
    .date-display { width: 100%; background: white; border: none; border-radius: 10px; padding: 12px 14px; font-size: 16px; color: #1c1c1e; cursor: pointer; text-align: left; }
    .mini-cal { background: white; border-radius: 12px; padding: 12px; margin-top: 6px; display: none; }
    .mini-cal.open { display: block; }
    .mini-cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .mini-cal-nav button { background: none; border: none; font-size: 18px; cursor: pointer; color: #007aff; padding: 2px 8px; }
    .mini-cal-nav span { font-size: 15px; font-weight: 600; color: #1c1c1e; }
    .mini-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .mini-day-name { text-align: center; font-size: 11px; font-weight: 600; color: #8e8e93; padding: 3px 0; }
    .mini-cell { display: flex; align-items: center; justify-content: center; height: 36px; border-radius: 8px; cursor: pointer; font-size: 14px; color: #1c1c1e; }
    .mini-cell:hover { background: #f2f2f7; }
    .mini-cell.today { color: #007aff; font-weight: 600; }
    .mini-cell.selected { background: #007aff; color: white; font-weight: 600; }
    .mini-cell.selected:hover { background: #007aff; }
    .mini-cell.empty { cursor: default; }
    .mini-cell.empty:hover { background: none; }
    .mini-cell.past { color: #c7c7cc; }

    /* Header calendar modal */
    .cal-modal { background: #f2f2f7; border-radius: 16px 16px 0 0; width: 100%; padding: 20px; padding-bottom: 40px; }
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .cal-nav button { background: none; border: none; font-size: 20px; cursor: pointer; color: #007aff; padding: 4px 10px; }
    .cal-nav span { font-size: 17px; font-weight: 600; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-day-name { text-align: center; font-size: 12px; font-weight: 600; color: #8e8e93; padding: 4px 0; }
    .cal-cell { display: flex; flex-direction: column; align-items: center; padding: 6px 2px; border-radius: 10px; cursor: pointer; min-height: 44px; justify-content: center; }
    .cal-cell:hover { background: #e5e5ea; }
    .cal-cell.today { background: #007aff; }
    .cal-cell.today .cal-num { color: white; }
    .cal-cell.empty { cursor: default; }
    .cal-cell.empty:hover { background: none; }
    .cal-num { font-size: 16px; font-weight: 500; color: #1c1c1e; }
    .cal-dot { width: 5px; height: 5px; border-radius: 50%; background: #007aff; margin-top: 3px; }
    .cal-cell.today .cal-dot { background: white; }
    .cal-close { width: 100%; margin-top: 16px; padding: 14px; border-radius: 12px; border: none; background: white; font-size: 16px; cursor: pointer; color: #1c1c1e; font-weight: 500; }

    .viewing-banner { background: #fff3cd; border-radius: 10px; padding: 10px 14px; margin-bottom: 10px; font-size: 14px; color: #856404; display: flex; align-items: center; justify-content: space-between; }
    .viewing-banner button { background: none; border: none; color: #007aff; font-size: 14px; cursor: pointer; font-weight: 500; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1 id="pageTitle">My Day</h1>
    <div class="date" id="dateLabel"></div>
  </div>
  <button class="cal-btn" id="calBtnHeader" onclick="openCalendar()" title="Calendar">📅</button>
</div>

<div class="page active" id="pageMyDay">
  <div class="content">
    <div id="viewingBanner" class="viewing-banner" style="display:none">
      <span id="viewingLabel"></span>
      <button onclick="goToToday()">Go to today</button>
    </div>
    <div class="section-title" id="planTitle">Today's plan</div>
    <div class="card" id="blockList"></div>
    <button class="add-btn" id="addBtn" onclick="openModal()">+ Add Activity</button>
  </div>
</div>

<div class="page" id="pageUpcoming">
  <div class="content">
    <div class="section-title">Upcoming</div>
    <div id="upcomingList"></div>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" id="navMyDay" onclick="switchTab('myDay')">
    <span class="nav-icon">☀️</span>
    <span class="nav-label">My Day</span>
  </button>
  <button class="nav-btn" id="navUpcoming" onclick="switchTab('upcoming')">
    <span class="nav-icon">📋</span>
    <span class="nav-label">Upcoming</span>
  </button>
</nav>

<!-- Add activity modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>Add Activity</h2>
    <label>Activity name</label>
    <input type="text" id="actName" placeholder="e.g. Morning run" />
    <label>Quick pick</label>
    <div class="presets" id="presets"></div>
    <label>Date</label>
    <button class="date-display" id="dateDisplay" onclick="toggleMiniCal()"></button>
    <div class="mini-cal" id="miniCal">
      <div class="mini-cal-nav">
        <button onclick="changeMiniMonth(-1)">‹</button>
        <span id="miniMonthLabel"></span>
        <button onclick="changeMiniMonth(1)">›</button>
      </div>
      <div class="mini-cal-grid" id="miniCalGrid"></div>
    </div>
    <label>Time</label>
    <div class="time-row">
      <input type="time" id="timeFrom" oninput="syncEndTime()" />
      <input type="time" id="timeTo" />
    </div>
    <label>Color</label>
    <div class="color-row" id="colorRow"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveBlock()">Add</button>
    </div>
  </div>
</div>

<!-- Header calendar modal -->
<div class="overlay" id="calOverlay">
  <div class="cal-modal">
    <div class="cal-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <span id="calMonthLabel"></span>
      <button onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <button class="cal-close" onclick="closeCalendar()">Close</button>
  </div>
</div>

<script>
  const COLORS = ['#007aff','#34c759','#ff9500','#ff3b30','#af52de','#5ac8fa','#ff2d55','#ffcc00'];
  const PRESETS = ['Sport','Dog walk','Workout','Dinner','Choir','Reading','Work','Shopping','Nap','Cooking'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  let selectedColor = COLORS[0];
  let viewingDate = null;
  let calMonth, calYear;
  let miniMonth, miniYear;
  let selectedDateKey = '';
  let currentTab = 'myDay';

  function dateKey(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function todayKey() {
    return dateKey(new Date());
  }

  function getBlocks(key) {
    const all = JSON.parse(localStorage.getItem('allDays') || '{}');
    return all[key] || [];
  }

  function setBlocks(key, blocks) {
    const all = JSON.parse(localStorage.getItem('allDays') || '{}');
    all[key] = blocks;
    localStorage.setItem('allDays', JSON.stringify(all));
  }

  function currentKey() {
    return viewingDate ? dateKey(viewingDate) : todayKey();
  }

  function isViewingToday() {
    return !viewingDate || dateKey(viewingDate) === todayKey();
  }

  function formatDateLabel(key) {
    const [y, m, d] = key.split('-').map(Number);
    const date = new Date(y, m - 1, d);
    if (key === todayKey()) return 'Today';
    const t = new Date(); t.setDate(t.getDate() + 1);
    if (key === dateKey(t)) return 'Tomorrow';
    return date.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
  }

  function friendlyDate(key) {
    const [y, m, d] = key.split('-').map(Number);
    const date = new Date(y, m - 1, d);
    if (key === todayKey()) return 'Today';
    const t = new Date(); t.setDate(t.getDate() + 1);
    if (key === dateKey(t)) return 'Tomorrow';
    return date.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
  }

  function init() {
    const now = new Date();
    calMonth = now.getMonth();
    calYear = now.getFullYear();
    buildColorPicker();
    buildPresets();
    renderDay();
  }

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('pageMyDay').classList.toggle('active', tab === 'myDay');
    document.getElementById('pageUpcoming').classList.toggle('active', tab === 'upcoming');
    document.getElementById('navMyDay').classList.toggle('active', tab === 'myDay');
    document.getElementById('navUpcoming').classList.toggle('active', tab === 'upcoming');
    document.getElementById('calBtnHeader').style.display = tab === 'myDay' ? 'block' : 'none';
    if (tab === 'myDay') {
      document.getElementById('pageTitle').textContent = 'My Day';
      renderDay();
    } else {
      document.getElementById('pageTitle').textContent = 'Upcoming';
      document.getElementById('dateLabel').textContent = '';
      renderUpcoming();
    }
  }

  function renderDay() {
    const key = currentKey();
    const blocks = getBlocks(key);
    const isToday = isViewingToday();
    const d = viewingDate || new Date();
    document.getElementById('dateLabel').textContent =
      d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
    document.getElementById('viewingBanner').style.display = isToday ? 'none' : 'flex';
    if (!isToday) {
      document.getElementById('viewingLabel').textContent =
        'Viewing: ' + d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
    }
    document.getElementById('planTitle').textContent = isToday ? "Today's plan" : "Activities";
    document.getElementById('addBtn').style.display = isToday ? 'block' : 'none';
    const list = document.getElementById('blockList');
    const sorted = [...blocks].sort((a, b) => a.from.localeCompare(b.from));
    if (sorted.length === 0) {
      list.innerHTML = '<div class="empty">' + (isToday ? 'No activities yet. Add your first one!' : 'No activities on this day.') + '</div>';
      return;
    }
    list.innerHTML = '';
    sorted.forEach((b, i) => {
      const div = document.createElement('div');
      div.className = 'block-item';
      div.innerHTML = `
        <div class="block-dot" style="background:${b.color}"></div>
        <div class="block-info">
          <div class="block-name">${b.name}</div>
          <div class="block-time">${b.from} – ${b.to}</div>
        </div>
        ${isToday ? `<button class="block-delete" onclick="deleteBlock('${key}', ${i})">×</button>` : ''}
      `;
      list.appendChild(div);
    });
  }

  function renderUpcoming() {
    const all = JSON.parse(localStorage.getItem('allDays') || '{}');
    const today = todayKey();
    const futureKeys = Object.keys(all).filter(k => k >= today && all[k].length > 0).sort();
    const container = document.getElementById('upcomingList');
    if (futureKeys.length === 0) {
      container.innerHTML = '<div class="card"><div class="empty">No upcoming activities yet.</div></div>';
      return;
    }
    container.innerHTML = '';
    futureKeys.forEach(key => {
      const blocks = [...all[key]].sort((a, b) => a.from.localeCompare(b.from));
      const group = document.createElement('div');
      group.className = 'date-group';
      const label = document.createElement('div');
      label.className = 'date-group-label' + (key === today ? ' is-today' : '');
      label.textContent = formatDateLabel(key);
      group.appendChild(label);
      const card = document.createElement('div');
      card.className = 'card';
      blocks.forEach((b, i) => {
        const div = document.createElement('div');
        div.className = 'block-item';
        div.innerHTML = `
          <div class="block-dot" style="background:${b.color}"></div>
          <div class="block-info">
            <div class="block-name">${b.name}</div>
            <div class="block-time">${b.from} – ${b.to}</div>
          </div>
          <button class="block-delete" onclick="deleteBlock('${key}', ${i})">×</button>
        `;
        card.appendChild(div);
      });
      group.appendChild(card);
      container.appendChild(group);
    });
  }

  function goToToday() {
    viewingDate = null;
    renderDay();
  }

  function deleteBlock(key, i) {
    let blocks = getBlocks(key);
    const sorted = [...blocks].sort((a, b) => a.from.localeCompare(b.from));
    const item = sorted[i];
    blocks = blocks.filter(b => !(b.name === item.name && b.from === item.from && b.to === item.to));
    setBlocks(key, blocks);
    if (currentTab === 'myDay') renderDay();
    else renderUpcoming();
  }

  function buildColorPicker() {
    const row = document.getElementById('colorRow');
    row.innerHTML = '';
    COLORS.forEach(c => {
      const d = document.createElement('div');
      d.className = 'color-dot' + (c === selectedColor ? ' selected' : '');
      d.style.background = c;
      d.onclick = () => { selectedColor = c; buildColorPicker(); };
      row.appendChild(d);
    });
  }

  function buildPresets() {
    const el = document.getElementById('presets');
    el.innerHTML = '';
    PRESETS.forEach(p => {
      const b = document.createElement('button');
      b.className = 'preset-chip';
      b.textContent = p;
      b.onclick = () => { document.getElementById('actName').value = p; };
      el.appendChild(b);
    });
  }

  // Mini calendar inside modal
  function toggleMiniCal() {
    document.getElementById('miniCal').classList.toggle('open');
  }

  function openMiniCal() {
    const now = new Date();
    miniMonth = now.getMonth();
    miniYear = now.getFullYear();
    renderMiniCal();
  }

  function changeMiniMonth(dir) {
    miniMonth += dir;
    if (miniMonth > 11) { miniMonth = 0; miniYear++; }
    if (miniMonth < 0) { miniMonth = 11; miniYear--; }
    renderMiniCal();
  }

  function renderMiniCal() {
    document.getElementById('miniMonthLabel').textContent = MONTHS[miniMonth] + ' ' + miniYear;
    const grid = document.getElementById('miniCalGrid');
    grid.innerHTML = '';
    DAYS.forEach(d => {
      const cell = document.createElement('div');
      cell.className = 'mini-day-name';
      cell.textContent = d;
      grid.appendChild(cell);
    });
    const firstDay = new Date(miniYear, miniMonth, 1).getDay();
    const daysInMonth = new Date(miniYear, miniMonth + 1, 0).getDate();
    const today = todayKey();
    for (let i = 0; i < firstDay; i++) {
      const blank = document.createElement('div');
      blank.className = 'mini-cell empty';
      grid.appendChild(blank);
    }
    for (let d = 1; d <= daysInMonth; d++) {
      const key = `${miniYear}-${String(miniMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday = key === today;
      const isSelected = key === selectedDateKey;
      const isPast = key < today;
      const cell = document.createElement('div');
      cell.className = 'mini-cell' +
        (isSelected ? ' selected' : '') +
        (isToday && !isSelected ? ' today' : '') +
        (isPast && !isSelected ? ' past' : '');
      cell.textContent = d;
      cell.onclick = () => selectDate(key);
      grid.appendChild(cell);
    }
  }

  function selectDate(key) {
    selectedDateKey = key;
    document.getElementById('dateDisplay').textContent = friendlyDate(key);
    document.getElementById('miniCal').classList.remove('open');
    renderMiniCal();
  }

  function syncEndTime() {
    const from = document.getElementById('timeFrom').value;
    if (!from) return;
    const [h, m] = from.split(':').map(Number);
    const total = h * 60 + m + 30;
    const newH = Math.floor(total / 60) % 24;
    const newM = total % 60;
    document.getElementById('timeTo').value =
      String(newH).padStart(2, '0') + ':' + String(newM).padStart(2, '0');
  }

  function openModal() {
    document.getElementById('actName').value = '';
    selectedDateKey = todayKey();
    document.getElementById('dateDisplay').textContent = friendlyDate(selectedDateKey);
    document.getElementById('miniCal').classList.remove('open');
    document.getElementById('timeFrom').value = '09:00';
    document.getElementById('timeTo').value = '09:30';
    selectedColor = COLORS[0];
    buildColorPicker();
    openMiniCal();
    document.getElementById('overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
  }

  function saveBlock() {
    const name = document.getElementById('actName').value.trim();
    const from = document.getElementById('timeFrom').value;
    const to = document.getElementById('timeTo').value;
    if (!name || !selectedDateKey || !from || !to) { alert('Please fill in all fields.'); return; }
    const blocks = getBlocks(selectedDateKey);
    blocks.push({ name, from, to, color: selectedColor });
    setBlocks(selectedDateKey, blocks);
    closeModal();
    if (currentTab === 'myDay') renderDay();
    else renderUpcoming();
  }

  // Header calendar
  function openCalendar() {
    const now = new Date();
    calMonth = now.getMonth();
    calYear = now.getFullYear();
    renderCalendar();
    document.getElementById('calOverlay').classList.add('open');
  }

  function closeCalendar() {
    document.getElementById('calOverlay').classList.remove('open');
  }

  function changeMonth(dir) {
    calMonth += dir;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    if (calMonth < 0) { calMonth = 11; calYear--; }
    renderCalendar();
  }

  function renderCalendar() {
    document.getElementById('calMonthLabel').textContent = MONTHS[calMonth] + ' ' + calYear;
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';
    DAYS.forEach(d => {
      const cell = document.createElement('div');
      cell.className = 'cal-day-name';
      cell.textContent = d;
      grid.appendChild(cell);
    });
    const firstDay = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    const todayStr = todayKey();
    const all = JSON.parse(localStorage.getItem('allDays') || '{}');
    for (let i = 0; i < firstDay; i++) {
      const blank = document.createElement('div');
      blank.className = 'cal-cell empty';
      grid.appendChild(blank);
    }
    for (let d = 1; d <= daysInMonth; d++) {
      const key = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday = key === todayStr;
      const hasData = all[key] && all[key].length > 0;
      const cell = document.createElement('div');
      cell.className = 'cal-cell' + (isToday ? ' today' : '');
      cell.innerHTML = `<span class="cal-num">${d}</span>${hasData ? '<div class="cal-dot"></div>' : ''}`;
      cell.onclick = () => {
        viewingDate = isToday ? null : new Date(calYear, calMonth, d);
        closeCalendar();
        switchTab('myDay');
        renderDay();
      };
      grid.appendChild(cell);
    }
  }

  document.getElementById('overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.getElementById('calOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeCalendar();
  });

  init();
</script>
</body>
</html>
